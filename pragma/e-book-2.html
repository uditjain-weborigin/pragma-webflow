<!doctype html>
<html>
  <head>
    <title>Pragma</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta name="description" content="Website description" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- change into index, follow -->
    <link rel="stylesheet" href="assets/fonts/satoshi/stylesheet.css" />
    <link rel="stylesheet" href="assets/fonts/icons/style.css" />
    <link rel="stylesheet" href="assets/styles/global.css" />
  </head>

  <body>
    <style>
      /* E-book Hero Section New Styles */
      .ebook-hero-section {
        padding-top: 130px;
        padding-bottom: 60px;
        background-color: #f5f8ff; /* Light blueish background as per design */
      }

      .ebook-hero-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 32px;
        width: 704.64px;
        height: 433.46px;
        max-width: 100%;
        margin: 0 auto;
      }

      .ebook-hero-left {
        width: 305.44px;
        height: 433.46px; /* Matched form height */
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .ebook-hero-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
      }

      .ebook-hero-right {
        width: 367.2px;
        height: 433.46px; /* Explicitly match container/image height */
        flex-shrink: 0;
      }

      .ebook-form-box {
        background: var(--white);
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .ebook-form-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 20px;
        color: var(--black-bg);
      }

      .ebook-form .form-field {
        margin-bottom: 12px;
        width: 100%;
      }

      .ebook-form .form-row {
        display: flex;
        gap: 12px;
      }

      .ebook-form .half-width {
        width: 50%;
      }

      .ebook-form input,
      .ebook-form select {
        width: 100%;
        height: 42px;
        padding: 10px 14px;
        border: 1px solid #ebebeb;
        border-radius: 8px;
        font-size: 13px;
        color: var(--black);
        background-color: var(--white);
        outline: none;
        font-family: var(--font-family);
      }

      .ebook-form select:invalid {
        color: #999;
      }

      .ebook-form select option {
        color: var(--black);
      }

      .ebook-form select {
        padding-right: 32px;
      }

      .ebook-form input::placeholder {
        color: #999;
      }

      .ebook-form .select-wrapper {
        position: relative;
      }

      .ebook-form select {
        appearance: none;
        -webkit-appearance: none;
        cursor: pointer;
      }

      .ebook-form .select-wrapper::after {
        content: "";
        width: 10px;
        height: 7px;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%23999999' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-size: contain;
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
      }

      .ebook-form .form-consent {
        margin: 12px 0 20px;
      }

      .ebook-form .consent-label {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        cursor: pointer;
      }

      .ebook-form .consent-label input {
        width: 16px;
        height: 16px;
        margin-top: 2px;
        cursor: pointer;
        flex-shrink: 0;
        padding: 0;
      }

      .ebook-form .consent-label p {
        font-size: 10px;
        line-height: 1.4;
        color: #666;
        margin: 0;
      }

      .ebook-download-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .ebook-download-btn:hover {
        background-color: var(--primary); /* Remove existing color change */
        opacity: 0.85;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(40, 113, 240, 0.2);
      }

      .ebook-download-btn:active {
        transform: translateY(0);
      }

      .ebook-download-btn i {
        font-size: 12px;
      }
      /* Overriding the social follow layout to center across the entire container */
      .ebook-hero-section .ebook-social-follow {
        width: 100%;
        margin-top: 24px;
        justify-content: center;
      }
      /* Overriding the social follow layout to center across the entire container */
      .ebook-social-follow {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 32px;
        width: 100%;
      }

      .ebook-social-follow span {
        font-size: 14px;
        color: #333;
        font-weight: 500;
      }

      .ebook-social-follow .social-icons {
        display: flex;
        gap: 8px;
      }

      .ebook-social-follow .icon-box {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background-color: transparent;
        transition: all 0.3s;
      }

      .ebook-social-follow .icon-box:hover {
        background-color: rgba(40, 113, 240, 0.1);
      }

      .ebook-social-follow .icon-box img {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }

      @media only screen and (max-width: 767px) {
        .ebook-hero-section {
          padding-top: 80px;
          padding-bottom: 40px;
          background-color: var(--white);
        }

        .ebook-hero-container {
          flex-direction: column;
          height: auto;
          width: 100%;
          gap: 0;
        }

        .ebook-hero-left {
          width: 100%;
          height: auto;
          padding: 0 24px;
          background-color: #f5f8ff; /* Light blue background for image area */
          padding-bottom: 30px;
        }

        .ebook-hero-left img {
          max-width: 260px;
          margin: 0 auto;
          border-radius: 0;
        }

        .ebook-hero-right {
          width: 100%;
          height: auto;
          padding: 30px 24px;
          background-color: #f5f8ff;
        }

        .ebook-form-box {
          padding: 32px 24px;
          border-radius: 12px;
          box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .ebook-form-title {
          font-size: 22px;
          text-align: center;
          margin-bottom: 24px;
        }

        .ebook-hero-section .ebook-social-follow {
          background-color: var(--white);
          margin-top: 0;
          padding: 40px 0;
        }

        .ebook-social-follow .icon-box {
          background-color: #e2edff; /* Light blue circle background */
          width: 32px;
          height: 32px;
        }

        .ebook-social-follow .icon-box:hover {
          background-color: #c5daff;
        }

        .ebook-download-btn {
          background-color: #2871f0;
          font-size: 15px;
          border-radius: 8px;
          height: 52px;
        }
      }
    </style>

    <!-- E-book content-start -->
    <section class="ebook-hero-section centered">
      <div class="ebook-hero-container">
        <!-- Left Image Column -->
        <div class="ebook-hero-left">
          <img
            src="assets/images/e-books/cheatsheet.png"
            alt="Pragma's Festive Cheat Sheet"
          />
        </div>

        <!-- Right Form Column -->
        <div class="ebook-hero-right">
          <div class="ebook-form-box">
            <h3 class="ebook-form-title">Get your E-book for free</h3>

            <form action="#" class="ebook-form">
              <div class="form-field">
                <input type="text" placeholder="Company Name" required />
              </div>
              <div class="form-field">
                <input
                  type="url"
                  placeholder="Business Website link"
                  required
                />
              </div>
              <div class="form-field">
                <input type="email" placeholder="vaishu@logisy.tech" required />
              </div>

              <div class="form-row">
                <div class="form-field half-width">
                  <input type="tel" placeholder="Contact Number" required />
                </div>
                <div class="form-field half-width">
                  <div class="select-wrapper">
                    <select class="custom-select" required>
                      <option value="" disabled selected>
                        Orders per month
                      </option>
                      <option value="0-100">0 - 100</option>
                      <option value="100-500">100 - 500</option>
                      <option value="500-1000">500 - 1000</option>
                      <option value="1000+">1000+</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="form-consent">
                <label class="consent-label">
                  <input type="checkbox" required />
                  <span class="checkmark"></span>
                  <p>
                    By submitting this form and clicking the button above, you
                    consent to marketing activities from Pragma. We may send you
                    emails or make phone calls.
                  </p>
                </label>
              </div>

              <button type="submit" class="button ebook-download-btn">
                <span>Download E-Book</span>
                <i class="icon-arrow-right"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="ebook-social-follow">
        <span>Follow us on</span>
        <div class="social-icons">
          <a href="#" class="icon-box"
            ><img src="assets/images/blogs assets/email_brand.png" alt="Email"
          /></a>
          <a href="#" class="icon-box"
            ><img
              src="assets/images/blogs assets/linkedin_branding.png"
              alt="LinkedIn"
          /></a>
        </div>
      </div>
    </section>
    <!-- E-book content-end -->
  </body>
</html>
